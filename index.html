<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Addicted2Sports™ — Victory Triangle Edition</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--navy:#060c14;--gold:#facc15;--cyan:#06b6d4;--green:#22c55e;--red:#ef4444;--slate:#94a3b8;--white:#e8eef7;--purple:#a855f7;--orange:#f59e0b;}
body{background:var(--navy);color:var(--white);font-family:-apple-system,'SF Pro Display',system-ui,sans-serif;min-height:100vh;}
.app{max-width:420px;margin:0 auto;background:var(--navy);min-height:100vh;position:relative;overflow-x:hidden;}
.topbar{background:rgba(6,9,16,0.97);border-bottom:2px solid rgba(250,204,21,0.22);padding:0 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:300;height:58px;}
.topbar-brand{display:flex;align-items:center;gap:9px;}
.logo-badge{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,#1e3a5f,#0d1f38);border:1.5px solid rgba(250,204,21,0.4);display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 0 12px rgba(250,204,21,0.12);}
.topbar-wordmark{display:flex;flex-direction:column;}
.topbar-title{font-weight:900;font-size:11px;letter-spacing:1.5px;color:var(--white);}
.topbar-sub{font-size:9px;color:var(--gold);letter-spacing:0.5px;}
.screen{padding:14px 14px 92px;display:none;position:relative;z-index:1;}
.screen.active{display:block;}
.card{background:rgba(10,16,28,0.92);border-radius:14px;padding:14px;border:1px solid rgba(255,255,255,0.07);margin-bottom:12px;}
.picks-empty{text-align:center;padding:28px 16px;color:var(--slate);font-size:13px;border:1px dashed rgba(255,255,255,.1);border-radius:14px;}
.big-btn{width:100%;padding:14px 0;border-radius:50px;border:none;font-weight:900;font-size:15px;cursor:pointer;transition:all 0.18s;}
.big-btn-gold{background:var(--gold);color:#000;}
.input-field{width:100%;padding:10px 12px;border-radius:9px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.14);color:var(--white);font-size:13px;outline:none;margin-bottom:8px;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
</style>
</head>
<body>

<div class="app" id="appRoot">
  <div class="topbar">
    <div class="topbar-brand">
      <div class="logo-badge">🏆</div>
      <div class="topbar-wordmark">
        <div class="topbar-title">ADDICTED2SPORTS™</div>
        <div class="topbar-sub">Victory Triangle</div>
      </div>
    </div>
    <button id="topbarBtn" onclick="if(currentUser.email){a2sLock();}else{showLoginModal();}" style="background:none;border:none;color:var(--gold);font-size:13px;font-weight:800;cursor:pointer;padding:8px 12px;">🔐 Login</button>
  </div>

  <!-- HOME SCREEN -->
  <div id="s-home" class="screen active">
    <div style="padding:10px 0 14px;margin-bottom:6px;border-bottom:1px solid rgba(255,255,255,0.06);display:flex;align-items:center;gap:10px;">
      <div style="width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#1e3a5f,#0d1f38);border:1.5px solid rgba(250,204,21,0.28);display:flex;align-items:center;justify-content:center;font-size:20px;">🎯</div>
      <div>
        <div style="font-weight:900;font-size:15px;" id="tierName">Today's Picks</div>
        <div style="font-size:11px;color:var(--cyan);" id="tierStatus">Tap to login</div>
      </div>
    </div>

    <div class="card" style="border-color:rgba(250,204,21,.2);background:rgba(26,18,0,.85);">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
        <span style="font-size:12px;font-weight:800;color:var(--gold);letter-spacing:1px;">📅 TODAY'S PICKS</span>
        <span id="pickStatus" style="background:rgba(148,163,184,.1);color:var(--slate);border:1px solid rgba(148,163,184,.25);padding:3px 10px;border-radius:20px;font-size:10px;font-weight:800;">🔒 LOCKED</span>
      </div>
      <div style="font-size:11px;color:var(--slate);letter-spacing:2px;text-align:center;margin-bottom:6px;">PICKS DROP IN</div>
      <div style="font-size:42px;font-weight:900;color:var(--gold);letter-spacing:4px;text-align:center;font-variant-numeric:tabular-nums;text-shadow:0 0 20px rgba(250,204,21,.4);" id="countdown">--:--:--</div>
      <div id="dropMsg" style="color:var(--slate);font-size:12px;text-align:center;margin-top:8px;">🔔 Picks dropping soon!</div>
    </div>

    <div id="picksContainer"></div>
  </div>
</div>

<script>
// ============================================
// PAYMENT VERIFICATION SYSTEM
// ============================================

let currentUser={email:null,tier:null,txnId:null,expiresAt:null};
let adminPicks=JSON.parse(localStorage.getItem('a2s_picks')||'[]');

function initPaymentSession(){
  const stored=localStorage.getItem('a2s_payment_session');
  if(!stored)return false;
  try{
    const sess=JSON.parse(stored);
    if(new Date(sess.expiresAt)>new Date()){
      currentUser=sess;
      return true;
    }else{
      logoutPayment();
      return false;
    }
  }catch(e){
    logoutPayment();
    return false;
  }
}

function setPaymentSession(email,tier,txnId,durationHours){
  const expiresAt=new Date(Date.now()+durationHours*3600000).toISOString();
  currentUser={email,tier,txnId,expiresAt};
  localStorage.setItem('a2s_payment_session',JSON.stringify(currentUser));
  localStorage.setItem('a2s_fan_tier',tier);
}

function logoutPayment(){
  currentUser={email:null,tier:null,txnId:null,expiresAt:null};
  localStorage.removeItem('a2s_payment_session');
  localStorage.removeItem('a2s_fan_tier');
  renderPicks();
}

function isUserPaid(){
  if(!currentUser.email)return false;
  if(!currentUser.expiresAt)return false;
  return new Date(currentUser.expiresAt)>new Date();
}

function a2sIsPaid(){
  return isUserPaid();
}

function verifyPayPalReceipt(email,txnId){
  const mockDB={
    'test@example.com|I-123ABC':{tier:'gold',hours:24},
    'demo@a2s.com|I-456DEF':{tier:'allaccess',hours:168},
    'fan@a2s.com|I-789GHI':{tier:'metallica',hours:24}
  };
  const key=email+'|'+txnId;
  const result=mockDB[key];
  if(result){
    setPaymentSession(email,result.tier,txnId,result.hours);
    showPaymentModal('✅ Access Verified!','Welcome to Addicted2Sports! Your picks are ready.');
    return true;
  }else{
    alert('❌ Receipt not found.\n\nTest Accounts:\nemail: test@example.com\ntxn: I-123ABC\n\nemail: demo@a2s.com\ntxn: I-456DEF');
    return false;
  }
}

function showLoginModal(){
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:9999;';
  modal.innerHTML=`<div style="background:linear-gradient(135deg,#0d1f38,#1a2f4a);border:2px solid rgba(250,204,21,0.4);border-radius:16px;padding:28px 24px;text-align:center;max-width:320px;box-shadow:0 0 30px rgba(250,204,21,0.15);"><div style="font-size:28px;margin-bottom:12px;">🔐</div><div style="color:#facc15;font-size:16px;font-weight:900;margin-bottom:8px;">Login Required</div><div style="font-size:13px;color:#94a3b8;margin-bottom:16px;">Enter your email and PayPal receipt to unlock picks.</div><input id="paymentEmail" type="email" placeholder="your@email.com" class="input-field"/><input id="paymentTxnId" type="text" placeholder="PayPal Txn ID (I-...)" class="input-field" style="margin-bottom:12px;"/><div style="display:flex;gap:8px;"><button onclick="attemptLoginPayment()" style="flex:1;padding:10px;background:#facc15;color:#000;border:none;border-radius:50px;font-weight:900;font-size:13px;cursor:pointer;">Login</button><button onclick="this.closest('[style*=z-index]').remove()" style="flex:1;padding:10px;background:rgba(255,255,255,0.1);color:#e8eef7;border:1px solid rgba(255,255,255,0.2);border-radius:50px;font-weight:800;font-size:13px;cursor:pointer;">Cancel</button></div></div>`;
  document.body.appendChild(modal);
  document.getElementById('paymentEmail').focus();
}

function attemptLoginPayment(){
  const email=document.getElementById('paymentEmail').value.trim().toLowerCase();
  const txnId=document.getElementById('paymentTxnId').value.trim();
  if(!email||!email.includes('@')){alert('⚠️ Enter valid email');return;}
  if(!txnId||txnId.length<3){alert('⚠️ Enter PayPal Txn ID');return;}
  const modal=event.target.closest('[style*=z-index]');
  if(verifyPayPalReceipt(email,txnId)){
    setTimeout(()=>modal.remove(),1500);
    setTimeout(()=>renderPicks(),1600);
  }
}

function showPaymentModal(title,body){
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:9999;';
  modal.innerHTML=`<div style="background:linear-gradient(135deg,#0d1f38,#1a2f4a);border:2px solid rgba(250,204,21,0.4);border-radius:16px;padding:28px 24px;text-align:center;max-width:320px;box-shadow:0 0 30px rgba(250,204,21,0.15);"><div style="font-size:28px;margin-bottom:12px;">🔓</div><div style="color:#facc15;font-size:16px;font-weight:900;margin-bottom:8px;">${title}</div><div style="color:#94a3b8;font-size:13px;margin-bottom:18px;line-height:1.6;">${body}</div><button onclick="this.parentElement.parentElement.remove()" style="background:#facc15;color:#000;border:none;border-radius:50px;padding:12px 28px;font-size:14px;font-weight:900;cursor:pointer;">Got It 🏆</button></div>`;
  document.body.appendChild(modal);
}

function a2sUnlock(){
  if(!isUserPaid()){
    showLoginModal();
    return;
  }
  showPaymentModal('Already Active','Your '+currentUser.tier+' access is active!');
}

function a2sLock(){
  logoutPayment();
}

// ============================================
// RENDER PICKS WITH PAYMENT GATES
// ============================================

function renderPicks(){
  const container=document.getElementById('picksContainer');
  if(!container)return;

  // GATE #1: Not logged in
  if(!currentUser.email){
    container.innerHTML='<div class="card" style="text-align:center;padding:32px 16px;"><div style="font-size:32px;margin-bottom:12px;">🔒</div><div style="font-weight:800;color:#facc15;margin-bottom:8px;">Login to Unlock</div><div style="font-size:13px;color:#94a3b8;margin-bottom:16px;">Sign in with your PayPal receipt to see expert picks.</div><button onclick="showLoginModal()" class="big-btn big-btn-gold">🔓 Login to Unlock</button></div>';
    document.getElementById('tierName').textContent='Today\'s Picks';
    document.getElementById('tierStatus').textContent='Login to unlock';
    document.getElementById('topbarBtn').textContent='🔐 Login';
    return;
  }

  // GATE #2: Subscription expired
  if(!isUserPaid()){
    const expDate=new Date(currentUser.expiresAt).toLocaleString();
    container.innerHTML='<div class="card" style="text-align:center;padding:32px 16px;"><div style="font-size:32px;margin-bottom:12px;">⏰</div><div style="font-weight:800;color:#ef4444;margin-bottom:8px;">Access Expired</div><div style="font-size:13px;color:#94a3b8;">Your '+currentUser.tier+' access ended on<br/><strong style="color:#e8eef7;">'+expDate+'</strong></div></div>';
    document.getElementById('tierName').textContent='Expired';
    document.getElementById('tierStatus').textContent=currentUser.tier+' · expired';
    return;
  }

  // GATE #3: Show paid user picks
  document.getElementById('tierName').textContent='✅ '+currentUser.tier+' Tier';
  document.getElementById('tierStatus').textContent='Valid until '+new Date(currentUser.expiresAt).toLocaleDateString();
  document.getElementById('topbarBtn').textContent='🚪 Logout';

  if(!adminPicks.length){
    container.innerHTML='<div class="picks-empty">📊 No picks released yet. Check back at drop time!</div>';
    return;
  }

  let html='<div style="background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.3);border-radius:12px;padding:12px 14px;margin-bottom:12px;"><strong style="color:#22c55e;font-weight:900;">🟢 LIVE — '+adminPicks.length+' picks available</strong></div>';
  
  if(Array.isArray(adminPicks)){
    adminPicks.forEach((p,i)=>{
      html+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px;"><div><strong style="font-size:17px;font-weight:900;">'+p.team+'</strong><div style="font-size:12px;color:#94a3b8;margin-top:4px;">'+p.betType+' · '+p.odds+'</div></div></div>'+(p.note?'<div style="font-size:12px;color:#94a3b8;font-style:italic;">"'+p.note+'"</div>':'')+'</div>';
    });
  }
  
  container.innerHTML=html;
}

// ============================================
// COUNTDOWN TIMER
// ============================================

setInterval(()=>{
  const dropTime=parseInt(localStorage.getItem('a2s_drop_target')||'0');
  if(!dropTime){
    document.getElementById('countdown').textContent='--:--:--';
    return;
  }
  const now=Math.floor(Date.now()/1000);
  const secs=dropTime-now;
  if(secs<=0){
    document.getElementById('pickStatus').textContent='🟢 LIVE';
    document.getElementById('pickStatus').style.background='rgba(34,197,94,.15)';
    document.getElementById('pickStatus').style.color='var(--green)';
    document.getElementById('dropMsg').textContent='🔥 Picks are LIVE!';
    renderPicks();
  }else{
    const h=Math.floor(secs/3600);
    const m=Math.floor((secs%3600)/60);
    const s=secs%60;
    document.getElementById('countdown').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
  }
},1000);

// ============================================
// INITIALIZE ON LOAD
// ============================================

document.addEventListener('DOMContentLoaded', ()=>{
  initPaymentSession();
  renderPicks();
});

// ============================================
// ADMIN FUNCTIONS FOR TESTING
// ============================================

function pushTestPicks(){
  const testPicks=[
    {team:'Lakers',betType:'MONEYLINE',odds:'-120',note:'Sharp action moving here'},
    {team:'Warriors',betType:'SPREAD',odds:'-5.5',note:'Monitor line movement'},
    {team:'Celtics',betType:'OVER',odds:'215.5',note:'Pace should favor totals'},
    {team:'Heat',betType:'PARLAY',odds:'+250',note:'Monitor weather'}
  ];
  localStorage.setItem('a2s_picks',JSON.stringify(testPicks));
  alert('📡 Test picks pushed! Set drop time to test countdown.');
  renderPicks();
}

function setDropTimeNow(){
  const now=Math.floor(Date.now()/1000)+5;
  localStorage.setItem('a2s_drop_target',now);
  alert('Drop time set to 5 seconds from now. Watch the countdown!');
}

// Admin functions available in browser console:
// pushTestPicks() - adds 4 test picks
// setDropTimeNow() - sets drop time to 5 seconds
// currentUser - view current logged in user
// initPaymentSession() - reload session
</script>

</body>
</html>
